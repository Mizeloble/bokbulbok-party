# fly.toml app configuration file for bokbulbok-party
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bokbulbok-party'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  # 런치 기간 상시 오픈(§4-A): 콜드스타트 없이 첫 방문자가 즉시 입장.
  # 런치 종료 후 'stop' / min 0 으로 되돌려 scale-to-zero 복귀 → 평소 비용 0 근접.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
