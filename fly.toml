# fly.toml app configuration file generated for ax-lunch-coffee on 2026-04-26T23:23:08+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ax-lunch-coffee'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

# 누적 게임 히스토리(SQLite)를 stop-start·재배포에도 살리는 영구 볼륨.
# 배포 전 한 번만:  fly volumes create coffee_data --size 1 --region nrt
# 단일 머신 전제 — HA로 머신 늘리면 볼륨도 머신마다 따로 생기므로 데이터가 갈라짐.
[[mounts]]
  source = 'coffee_data'
  destination = '/app/data'
