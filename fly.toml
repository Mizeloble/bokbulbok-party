# fly.toml app configuration file for bokbulbok-party
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bokbulbok-party'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  # 런치 기간 1대 상시가동(§4-A): 콜드스타트 없이 첫 방문자가 즉시 입장.
  # Fly에서 "1대를 항상 띄워둔다"는 'stop' + min 1 조합으로만 성립한다.
  # ('off'는 "떠 있으면 안 끈다"일 뿐, 꺼진 머신을 띄우지 않고 min도 무시됨 →
  #  배포/크래시 후 stopped로 떨어진다.) 'stop'+min 1은 1대뿐이라 그 1대를
  # 절대 안 끄고, 꺼지면 자동 재기동한다.
  # 런치 종료 후 min 0 으로 되돌리면 scale-to-zero 복귀 → 평소 비용 0 근접.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
